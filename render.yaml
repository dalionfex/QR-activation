services:
  - type: web
    name: qr-saas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
